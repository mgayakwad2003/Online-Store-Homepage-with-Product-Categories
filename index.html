<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Online Store</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Categories</a>
            <a href="#">Cart</a>
        </nav>
    </header>

    <!-- Categories -->
    <section class="categories">
    <button onclick="filterProducts('All')">All</button>
    <button onclick="filterProducts('Electronics')">Electronics</button>
    <button onclick="filterProducts('Fashion')">Fashion</button>
    <button onclick="filterProducts('Books')">Books</button>
    </section>

    <section class="controls">

    <!-- Sorting -->
    <select onchange="sortProducts(this.value)">
        <option value="">Sort By</option>
        <option value="low">Price: Low to High</option>
        <option value="high">Price: High to Low</option>
    </select>

    <!-- Price Filter -->
    <select onchange="filterByPrice(this.value)">
        <option value="">Filter by Price</option>
        <option value="500">Below ₹500</option>
        <option value="1000">Below ₹1000</option>
        <option value="20000">Below ₹20000</option>
    </select>

    <!-- Rating Filter -->
    <select onchange="filterByRating(this.value)">
        <option value="">Filter by Rating</option>
        <option value="4">4★ & above</option>
        <option value="3">3★ & above</option>
    </select>

</section>

    <!-- Products -->
    <section class="products" id="productContainer">
    <!-- Products will come from JavaScript -->
</section>

<script src="script.js"></script>
</body>
</html>
