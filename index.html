<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Online Store</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Categories</a>
            <a href="#">Cart</a>
        </nav>
    </header>

    <!-- Categories -->
    <section class="categories">
        <button>All</button>
        <button>Electronics</button>
        <button>Fashion</button>
        <button>Books</button>
    </section>

    <!-- Products -->
    <section class="products">

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Smartphone</h3>
            <p>₹15,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>T-shirt</h3>
            <p>₹500</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Book</h3>
            <p>₹300</p>
            <button>Add to Cart</button>
        </div>

    </section>

</body>
</html>
